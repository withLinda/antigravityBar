name: AntigravityBar
options:
  deploymentTarget:
    macOS: 14.0
settings:
  base:
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: 6.0

schemes:
  AntigravityBar:
    shared: true
    build:
      targets:
        AntigravityBar: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AntigravityBarTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  AntigravityBar:
    type: application
    platform: macOS
    bundleId: com.linda.AntigravityBar
    sources:
      - path: Sources
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.linda.AntigravityBar
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0

  AntigravityBarTests:
    type: bundle.unit-test
    platform: macOS
    bundleId: com.linda.AntigravityBar.Tests
    sources:
      - path: Tests
        type: syncedFolder
    settings:
      base:
        INFOPLIST_FILE: Tests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.linda.AntigravityBar.Tests
    dependencies:
      - target: AntigravityBar
